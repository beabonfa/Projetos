<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background-color: #f4ff7f6;
            }
            .calculadora{
                background-color: #202020;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                width: 320px;
            }
            #display{
                width: 100%;
                height: 70px;
                background-color: #a0b0a0;
                border: none;
                border-radius: 5px;
                margin-bottom:20px;
                font-size: 2rem;
                text-align: right;
                padding: 10px;
                color: #111;
                font-family: monospace
            }
            .bottons{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            button{
                padding: 20px;
                font-size: 1.25rem;
                border: none;
                border-radius: 5px;
                background-color: #333;
                color: #fff;
                cursor: pointer;
                transition: background-color 0.2s;
            }
            button:hover{
                background-color: #444;
            }
            button.operador{
                background-color: #ff9500;
            }
            button.operador:hover{
                background-color: #e08500;
            }
            button.clear{
                background-color: #ff3b30;
                color: white;
            }
            button.clear:hover{
                background-color: #d32f2f;
            }
            button.equal{
                background-color: #34c759;
                color: white;
                grid-column: span 2;
            }
            button.equal:hover{
                background-color: #28a745;
            }

        </style>
    </head>
    <body>
        <div class="calculadora">
            <input type="text" id="display" readonly>

            <div class="bottons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button onclick="appendValue('/')" class="operador">/</button>
                <button onclick="appendValue('*')" class="operador">*</button>
                <button onclick="appendValue('-')" class="operador">-</button>

                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button onclick="appendValue('+')" class="operador">+</button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button onclick="appendValue('.')">.</button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>  
                <button onclick="appendValue('3')">3</button>
                <button onclick="appendValue('0')">0</button>

                <button onclick="calculate()" class="equal">=</button>
            </div>
        </div>

        <script>
            const display = document.getElementById('display');

           // Adicionar numeros ou operações na tela
            function appendValue(value){
                display.value += value;
            }

            // Limpar a tela
            function clearDisplay(){
                display.value = '';
            }

            // realizar calculo matematico usando eval() de forma simples
            function calculate(){
                try{
                    // se o display não estiver vazio, calcular o resultado
                    if(display.value !== ''){
                        display.value = eval(display.value);
                    }
                } catch (error) {
                    display.value = 'Erro';
                }
            }
        </script>
</html>
