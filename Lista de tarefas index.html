<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
   <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0eafc, #cfded3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .todo-container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .iput-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius:8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #6c5ce7;
        }
        ul {
            list-style: none;
        }
        li {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
            cursor: pointer;
            transition: background 0.2s;
        }
        li:hover {
            background: #f1f2f6;
        }
        li.completed span {
            text-decoration: line-through;
            color: #a0a0a0;
        }
        /* estilo padrão do botão*/
        .delete-btn {
            background: #ff7675;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #d63031;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="todo-container">
        <h2>Lista de Tarefas</h2>
        <div class="iput-section">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
           <button id="addBtn">add</button>
        </div>
        <ul id="taskList"></ul>
    </div>
    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Função para adicionar uma nova tarefa
        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === '') {
                alert('Por favor, digite uma tarefa.');
                return;
            }
            // criar item da lista
            const li = document.createElement('li');

            // Crias texto da tarefa
            const textspam = document.createElement('span');
            textspam.textContent = taskText;
            li.appendChild(textspam);

            // Criar botão de deletar
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Deletar';
            deleteBtn.classList.add('delete-btn');
            li.appendChild(deleteBtn);

            // Marcar como concluida ao clicar no texto da tarefa
            textspam.addEventListener('click', () => {
                li.classList.toggle('completed');
            });

            // Excluir tarefa ao clicar no botão de deletar
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Evita marcar como concluida ao clicar no botão de deletar
                li.remove();
            });
            // Adicionar a tarefa à lista na tela
            taskList.appendChild(li);

            // Limpar o campo de texto
            taskInput.value = '';
            taskInput.focus();
        }
        // Evento de apertar "enter" no teclado
        taskInput.addEventListener('keypress',(e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

    </script>
    </html>
